name: Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.6

      - name: Setup Haxelib
        run: |
          mkdir ~/haxelib
          haxelib setup ~/haxelib

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang

      - name: Install Haxe Libraries
        run: |
          haxelib install hxcpp
          haxelib install lime
          haxelib install openfl
          haxelib install flixel
          haxelib install flixel-ui
          haxelib install flixel-addons

      - name: Setup Lime
        run: |
          haxelib run lime setup

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;23.1.7779620"

      - name: Set Android Environment
        run: |
          echo "ANDROID_SDK=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/23.1.7779620" >> $GITHUB_ENV

      - name: Setup Lime Android
        run: |
          haxelib run lime setup android

      - name: Build APK
        env:
          ANDROID_SDK: ${{ env.ANDROID_SDK }}
          ANDROID_NDK_ROOT: ${{ env.ANDROID_NDK_ROOT }}
        run: |
          haxelib run lime build android -release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Kareshi-Android
          path: export/android/bin