name: Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.6

      - name: Setup haxelib
        run: |
          mkdir ~/haxelib
          haxelib setup ~/haxelib

      - name: Install Linux build tools
        run: |
          sudo apt update
          sudo apt install -y build-essential clang libc++-dev libc++abi-dev

      - name: Install Haxe libraries
        run: |
          haxelib install hxcpp --quiet
          haxelib install lime --quiet
          haxelib install openfl --quiet
          haxelib install flixel --quiet
          haxelib install flixel-ui --quiet
          haxelib install flixel-addons --quiet
          haxelib install extension-androidtools --quiet

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android tools
        run: |
          sdkmanager "platforms;android-33" "build-tools;33.0.2" "ndk;21.4.7075529"

      - name: Configure Lime for Android
        run: |
          haxelib run lime config ANDROID_SDK $ANDROID_HOME
          haxelib run lime config ANDROID_NDK_ROOT $ANDROID_HOME/ndk/21.4.7075529
          haxelib run lime config JAVA_HOME $JAVA_HOME
          haxelib run lime config ANDROID_SETUP true

      - name: Generate Gradle project
        run: |
          haxelib run lime update android -debug

      - name: Patch Gradle to use SDK 33
        run: |
          find export/android/bin -name "*.gradle" | while read f; do
            sed -i 's/compileSdkVersion Integer.parseInt("[0-9]*")/compileSdkVersion 33/g' "$f"
            sed -i 's/targetSdkVersion Integer.parseInt("[0-9]*")/targetSdkVersion 33/g'   "$f"
            sed -i 's/compileSdkVersion [0-9][0-9]*/compileSdkVersion 33/g'               "$f"
            sed -i 's/targetSdkVersion [0-9][0-9]*/targetSdkVersion 33/g'                 "$f"
            sed -i 's/android-[0-9][0-9]*/android-33/g'                                   "$f"
          done

      - name: Assemble APK
        run: |
          cd export/android/bin
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kareshi-android-debug
          path: export/android/bin/app/build/outputs/apk/debug/KareshiProject-debug.apk