name: Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.6

      - name: Install Haxe libs
        run: |
          haxelib install lime
          haxelib install openfl
          haxelib install flixel
          haxelib install flixel-ui
          haxelib install flixel-addons

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Detect Android SDK & NDK
        run: |
          echo "ANDROID_SDK=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$(find $ANDROID_HOME/ndk -maxdepth 1 -type d | tail -n 1)" >> $GITHUB_ENV

      - name: Setup Lime Android
        run: haxelib run lime setup android

      - name: Build APK
        run: haxelib run lime build android -release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kareshi-android
          path: export/android/bin