name: Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.6

      - name: Setup haxelib
        run: |
          mkdir ~/haxelib
          haxelib setup ~/haxelib

      - name: Install Linux build tools
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            clang \
            libc++-dev \
            libc++abi-dev

      - name: Install Haxe libraries
        run: |
          haxelib install hxcpp --quiet
          haxelib install lime --quiet
          haxelib install openfl --quiet
          haxelib install flixel --quiet
          haxelib install flixel-ui --quiet
          haxelib install flixel-addons --quiet
          haxelib git extension-androidtools https://github.com/openfl/extension-androidtools

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager "ndk;23.1.7779620"

      - name: Configure Android paths for Lime
        run: |
          haxelib run lime config ANDROID_SDK $ANDROID_HOME
          haxelib run lime config ANDROID_NDK_ROOT $ANDROID_HOME/ndk/23.1.7779620
          haxelib run lime config JAVA_HOME $JAVA_HOME

      - name: Build APK
        run: |
          haxelib run lime build android -release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kareshi-android
          path: export/android/bin