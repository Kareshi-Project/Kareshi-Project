name: Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.6

      - name: Setup haxelib
        run: |
          mkdir ~/haxelib
          haxelib setup ~/haxelib

      - name: Install Linux build tools
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            clang \
            libc++-dev \
            libc++abi-dev

      - name: Install Haxe libraries
        run: |
          haxelib install hxcpp
          haxelib install lime
          haxelib install openfl
          haxelib install flixel
          haxelib install flixel-ui
          haxelib install flixel-addons
          haxelib git extension-androidtools https://github.com/openfl/extension-androidtools

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager "ndk;23.1.7779620"

      - name: Configure Android paths
        run: |
          echo "ANDROID_SDK=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/23.1.7779620" >> $GITHUB_ENV

      - name: Lime setup
        run: |
          haxelib run lime setup

      - name: Lime setup android
        run: |
          haxelib run lime setup android

      - name: Build APK
        env:
          ANDROID_SDK: ${{ env.ANDROID_SDK }}
          ANDROID_NDK_ROOT: ${{ env.ANDROID_NDK_ROOT }}
        run: |
          haxelib run lime build android -release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kareshi-android
          path: export/android/bin